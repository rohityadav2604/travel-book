name: memorybook

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: memorybook
      POSTGRES_USER: memorybook
      POSTGRES_PASSWORD: memorybook
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memorybook -d memorybook"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  init-storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    depends_on:
      storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://storage:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/memorybook-raw local/memorybook-public local/memorybook-ephemeral &&
      mc anonymous set download local/memorybook-public
      "

volumes:
  db-data:
  redis-data:
  minio-data:
